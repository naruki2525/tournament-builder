<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大会組み合わせビルダー</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#12213A">
<link rel="icon" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="トーナメント">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --navy:#12213A;
    --navy-2:#1B3358;
    --line:#2A4570;
    --court:#E9EDF3;
    --paper:#F6F7FA;
    --white:#FFFFFF;
    --amber:#F2A93B;
    --amber-dark:#C9821F;
    --win:#2E7D5B;
    --lose:#C24B4B;
    --ink:#12213A;
    --sub:#5C6B84;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:"Hiragino Sans","Yu Gothic UI","Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .app{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

  /* ---- Header / scoreboard strip ---- */
  .board{
    background:linear-gradient(180deg,var(--navy) 0%, var(--navy-2) 100%);
    border-radius:14px;
    padding:22px 26px;
    color:var(--white);
    display:flex;align-items:center;justify-content:space-between;
    gap:16px;flex-wrap:wrap;
    box-shadow:0 8px 24px rgba(18,33,58,0.18);
    position:relative;overflow:hidden;
  }
  .board::after{
    content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;
    background:radial-gradient(circle, rgba(242,169,59,0.20), transparent 70%);
    pointer-events:none;
  }
  .board h1{font-size:22px;margin:0;letter-spacing:.02em;font-weight:800;}
  .board .tag{font-size:12px;color:#B9C6DE;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px;}
  .steps{display:flex;gap:6px;flex-wrap:wrap;font-size:12px;z-index:1;}
  .step{
    padding:6px 12px;border-radius:20px;background:rgba(255,255,255,0.08);
    color:#9FB0CC;border:1px solid rgba(255,255,255,0.14);font-weight:600;letter-spacing:.02em;
  }
  .step.active{background:var(--amber);color:var(--navy);border-color:var(--amber);}
  .step.done{background:rgba(46,125,91,0.25);color:#8FE0BC;border-color:rgba(143,224,188,0.3);}

  /* ---- panels ---- */
  .panel{background:var(--white);border:1px solid #DDE3ED;border-radius:14px;padding:26px;margin-top:20px;}
  .panel h2{font-size:17px;margin:0 0 4px;font-weight:800;}
  .panel .desc{font-size:13px;color:var(--sub);margin:0 0 20px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

  /* buttons */
  button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;font-weight:700;font-size:13.5px;transition:transform .08s ease, filter .12s ease;}
  button:active{transform:scale(0.97);}
  .btn-primary{background:var(--navy);color:#fff;padding:11px 22px;}
  .btn-primary:hover{filter:brightness(1.15);}
  .btn-primary:disabled{background:#C4CCDA;cursor:not-allowed;}
  .btn-ghost:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-amber{background:var(--amber);color:var(--navy);padding:11px 22px;}
  .btn-amber:hover{filter:brightness(1.06);}
  .btn-ghost{background:transparent;color:var(--navy);padding:9px 16px;border:1.5px solid #C7D0E0;}
  .btn-ghost:hover{background:var(--court);}
  .btn-sm{padding:6px 10px;font-size:12px;min-height:36px;}
  .btn-danger{background:transparent;color:var(--lose);padding:6px 10px;font-size:12px;border:1.5px solid #EAC6C6;}
  .btn-danger:hover{background:#FBEEEE;}
  .btn-icon{background:var(--court);color:var(--navy);width:30px;height:30px;border-radius:8px;font-size:13px;display:inline-flex;align-items:center;justify-content:center;}
  .btn-icon:hover{background:#DCE3EE;}

  input[type=text],input[type=number],select{
    font-family:inherit;border:1.5px solid #D3DAE6;border-radius:8px;padding:9px 12px;font-size:14px;color:var(--ink);background:#fff;
  }
  input[type=text]:focus,input[type=number]:focus,select:focus{outline:2px solid var(--amber);outline-offset:1px;border-color:var(--amber-dark);}
  input[type=number]{width:60px;text-align:center;font-variant-numeric:tabular-nums;font-weight:800;-moz-appearance:textfield;appearance:textfield;}
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}

  /* team chips (setup) */
  .team-list{display:flex;flex-direction:column;gap:8px;margin:18px 0;}
  .team-chip{
    display:flex;align-items:center;gap:10px;background:var(--court);border-radius:8px;padding:9px 12px;
  }
  .team-chip .num{font-weight:800;color:var(--sub);font-size:12px;width:22px;}
  .team-chip input{flex:1;background:#fff;}
  .empty-hint{font-size:13px;color:var(--sub);border:1.5px dashed #D3DAE6;border-radius:10px;padding:22px;text-align:center;}

  /* groups */
  .group-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:16px;}
  .group-card{border:1.5px solid #DDE3ED;border-radius:12px;padding:14px 16px;background:var(--paper);}
  .group-card h3{margin:0 0 10px;font-size:13px;letter-spacing:.08em;color:var(--navy-2);text-transform:uppercase;}
  .group-team{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13.5px;padding:6px 0;border-bottom:1px solid #E5EAF2;}
  .group-team:last-child{border-bottom:none;}
  .group-team select{font-size:12px;padding:4px 6px;}

  /* match list */
  .match-row{
    display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid #EDF0F5;font-size:14px;
  }
  .match-row:last-child{border-bottom:none;}
  .match-team{flex:1;font-weight:600;text-align:right;}
  .match-team.left{text-align:left;}
  .vs{color:var(--sub);font-size:11px;font-weight:700;padding:0 4px;}
  .match-decided .winner{color:var(--win);}
  .match-decided .loser{color:var(--sub);text-decoration:line-through;text-decoration-color:#C4CCDA;}
  .match-drawn{background:#FBF3E4;border-radius:8px;}

  /* standings table */
  table.standings{width:100%;border-collapse:collapse;margin-top:14px;font-size:13.5px;}
  table.standings th{text-align:center;font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;padding:8px 6px;border-bottom:2px solid #E5EAF2;}
  table.standings td{text-align:center;padding:9px 6px;border-bottom:1px solid #EDF0F5;font-variant-numeric:tabular-nums;}
  table.standings td.name{text-align:left;font-weight:700;}
  table.standings tr:last-child td{border-bottom:none;}
  .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:var(--court);font-weight:800;font-size:12px;color:var(--navy-2);}
  .rank-badge.top{background:var(--amber);color:var(--navy);}

  /* advance screen */
  .rank-row{display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:8px;}
  .rank-row.selected{background:#FBF3E4;}
  .rank-row .name{flex:1;font-weight:700;font-size:14px;}
  .rank-row .meta{font-size:12px;color:var(--sub);}
  .move-btns{display:flex;gap:4px;}

  /* bracket */
  .bracket-wrap{overflow-x:auto;padding:8px 4px 20px;}
  .bracket{display:flex;gap:36px;align-items:stretch;min-width:max-content;position:relative;}
  .bracket-lines{position:absolute;left:0;top:0;pointer-events:none;z-index:0;}
  .round-col{position:relative;z-index:1;}
  .bmatch{position:relative;z-index:1;}
  .round-col{display:flex;flex-direction:column;justify-content:space-around;gap:0;min-width:240px;}
  .round-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--sub);text-align:center;margin-bottom:10px;font-weight:700;}
  .bmatch{
    background:var(--paper);border:1.5px solid #DDE3ED;border-radius:10px;margin:10px 0;padding:10px 12px;position:relative;
  }
  .bslot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 2px;font-size:13.5px;font-weight:600;}
  .bslot.winner{color:var(--win);}
  .bslot.loser{color:var(--sub);text-decoration:line-through;text-decoration-color:#C4CCDA;}
  .bslot .bname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
  .bslot select{font-size:12px;padding:3px 4px;max-width:110px;}
  .bdivider{height:1px;background:#E5EAF2;margin:2px 0;}
  .champion-banner{
    margin-top:24px;background:linear-gradient(135deg,var(--navy),var(--navy-2));color:#fff;border-radius:14px;
    padding:28px;text-align:center;position:relative;overflow:hidden;
  }
  .champion-banner .tag{font-size:12px;letter-spacing:.2em;color:var(--amber);text-transform:uppercase;font-weight:700;}
  .champion-banner .name{font-size:30px;font-weight:800;margin-top:8px;}

  .footer-nav{display:flex;justify-content:space-between;margin-top:22px;}
  .small-note{font-size:12px;color:var(--sub);margin-top:10px;}
  .tabbar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
  .tab{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;background:var(--court);color:var(--navy-2);cursor:pointer;border:1.5px solid transparent;}
  .tab.active{background:var(--navy);color:#fff;}
  @media (max-width:600px){
    .board{padding:18px;}
    .board h1{font-size:18px;}
    .panel{padding:18px;}
  }
  @media (max-width:480px){
    .header-btn-row .btn-label{display:none;}
    .header-btn-row button{padding:8px 11px;min-width:38px;}
    input[type=text],input[type=number],select,button{min-height:38px;}
    input[type=number]{min-height:40px;}
  }
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:14px 0 0 0;border-radius:8px;}
  .table-scroll table{margin-top:0;}
  @media (max-width:700px){
    .table-scroll::after{
      content:"→ 横にスクロールできます";
      display:block;font-size:11px;color:var(--sub);text-align:right;padding:4px 4px 0;
    }
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
/* ============================= STATE ============================= */
let state = {
  stage: 'setup',            // setup | groups | prelim | advance | bracket | history
  previousStage: 'setup',    // stage to return to after viewing history
  tournamentName: '',        // 大会名
  teams: [],                 // {id, name}
  numGroups: 1,
  groups: [],                // [[teamId,...], ...]
  matches: [],               // {id, groupIdx, a, b, scoreA, scoreB}
  manualOrder: {},           // groupIdx -> [teamId in manual order] (tiebreak fallback / drag override)
  advanceCount: 0,
  advanceChecked: {},        // teamId -> bool
  advanceOrder: [],          // ordered list of teamIds chosen to advance (seed order)
  bracket: null,             // { rounds: [[{a,b,scoreA,scoreB,winner,bye}]], size }
  schedule: [],              // ordered array of match ids (全体対戦スケジュール)
  scheduleWarnings: [],      // 連戦を回避しきれなかった場合の注記
  history: [],               // 過去の大会結果履歴（保存済み）
  savedThisTournament: false,// 今の大会をすでに履歴保存したか
  holdThirdPlace: false,     // 3位決定戦を行うか
  withdrawnTeams: {},        // teamId -> true（棄権済み）
};
let nextTeamId = 1;
let nextMatchId = 1;

/* ============================= HELPERS ============================= */
function teamName(id){
  if(id === 'BYE' || id === null || id === undefined) return null;
  const t = state.teams.find(t=>t.id===id);
  return t ? t.name : '???';
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function seedOrder(n){
  // standard single-elimination seeding order, n must be power of 2
  let order=[1,2];
  while(order.length<n){
    const sum = order.length*2+1;
    const next=[];
    for(const s of order){ next.push(s); next.push(sum-s); }
    order = next;
  }
  return order;
}
function nextPow2(n){
  let p=1; while(p<n) p*=2; return p;
}

/* ============================= HISTORY STORAGE ============================= */
const HISTORY_KEY = 'tournament-history';
function hasStorage(){
  return typeof window!=='undefined' && !!window.storage;
}
async function loadHistory(){
  if(!hasStorage()) return [];
  try{
    const res = await window.storage.get(HISTORY_KEY, false);
    return (res && res.value) ? JSON.parse(res.value) : [];
  }catch(e){
    return [];
  }
}
async function persistHistory(list){
  if(!hasStorage()) return false;
  try{
    const res = await window.storage.set(HISTORY_KEY, JSON.stringify(list), false);
    return !!res;
  }catch(e){
    return false;
  }
}
async function initHistory(){
  state.history = await loadHistory();
  render();
}

/* ============================= 進行中データの自動保存 ============================= */
const AUTOSAVE_KEY = 'tournament-autosave';
function hasLocalStorage(){
  try{
    const k='__ts_test__';
    window.localStorage.setItem(k,'1');
    window.localStorage.removeItem(k);
    return true;
  }catch(e){
    return false;
  }
}
async function persistAutosave(snapshot){
  const json = JSON.stringify(snapshot);
  let saved = false;
  if(hasStorage()){
    try{ await window.storage.set(AUTOSAVE_KEY, json, false); saved = true; }catch(e){}
  }
  if(hasLocalStorage()){
    try{ window.localStorage.setItem(AUTOSAVE_KEY, json); saved = true; }catch(e){}
  }
  return saved;
}
async function loadAutosave(){
  if(hasStorage()){
    try{
      const res = await window.storage.get(AUTOSAVE_KEY, false);
      if(res && res.value) return JSON.parse(res.value);
    }catch(e){}
  }
  if(hasLocalStorage()){
    try{
      const raw = window.localStorage.getItem(AUTOSAVE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
  }
  return null;
}
async function clearAutosave(){
  if(hasStorage()){ try{ await window.storage.delete(AUTOSAVE_KEY, false); }catch(e){} }
  if(hasLocalStorage()){ try{ window.localStorage.removeItem(AUTOSAVE_KEY); }catch(e){} }
}
let autosaveTimer = null;
function scheduleAutosave(){
  if(!state.teams || state.teams.length===0) return; // 何もなければ保存しない
  if(autosaveTimer) clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(async ()=>{
    const snapshot = {
      tournamentName: state.tournamentName,
      teams: state.teams,
      numGroups: state.numGroups,
      groups: state.groups,
      matches: state.matches,
      manualOrder: state.manualOrder,
      advanceChecked: state.advanceChecked,
      advanceOrder: state.advanceOrder,
      bracket: state.bracket,
      schedule: state.schedule,
      scheduleWarnings: state.scheduleWarnings,
      withdrawnTeams: state.withdrawnTeams,
      savedThisTournament: state.savedThisTournament,
      holdThirdPlace: state.holdThirdPlace,
      stage: (state.stage==='history'||state.stage==='withdraw') ? state.previousStage : state.stage,
      nextTeamId, nextMatchId,
      savedAt: new Date().toISOString(),
    };
    const ok = await persistAutosave(snapshot);
    if(ok){
      const indicator = document.getElementById('autosaveIndicator');
      if(indicator){
        const t = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
        indicator.textContent = `💾 自動保存 ${t}`;
      }
    }
  }, 600);
}
function restoreSnapshot(snap){
  state.tournamentName = snap.tournamentName || '';
  state.teams = snap.teams || [];
  state.numGroups = snap.numGroups || 1;
  state.groups = snap.groups || [];
  state.matches = snap.matches || [];
  state.manualOrder = snap.manualOrder || {};
  state.advanceChecked = snap.advanceChecked || {};
  state.advanceOrder = snap.advanceOrder || [];
  state.bracket = snap.bracket || null;
  state.schedule = snap.schedule || [];
  state.scheduleWarnings = snap.scheduleWarnings || [];
  state.withdrawnTeams = snap.withdrawnTeams || {};
  state.savedThisTournament = snap.savedThisTournament || false;
  state.holdThirdPlace = snap.holdThirdPlace || false;
  state.stage = snap.stage || 'setup';
  state.previousStage = state.stage;
  nextTeamId = snap.nextTeamId || ((Math.max(0,...(snap.teams||[]).map(t=>t.id)))+1);
  nextMatchId = snap.nextMatchId || ((Math.max(0,...(snap.matches||[]).map(m=>m.id||0)))+1);
  render();
}
async function initAutosaveCheck(){
  const snap = await loadAutosave();
  if(snap && snap.teams && snap.teams.length>0 && state.teams.length===0){
    const teamCount = snap.teams.length;
    const label = snap.tournamentName && snap.tournamentName.trim() ? snap.tournamentName.trim() : '大会';
    const savedAtText = snap.savedAt ? new Date(snap.savedAt).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    showConfirmModal(
      `前回の続き「${label}」（${teamCount}チーム）が見つかりました。${savedAtText?`（保存日時：${savedAtText}）`:''}\n続きから再開しますか？`,
      ()=>restoreSnapshot(snap),
      {okLabel:'続きから再開する'}
    );
  }
}
async function saveCurrentTournamentToHistory(){
  const standings = getFinalStandings();
  if(!standings) return;
  const entry = {
    id: Date.now(),
    name: state.tournamentName && state.tournamentName.trim() ? state.tournamentName.trim() : `無題の大会（${state.teams.length}チーム）`,
    date: new Date().toISOString().slice(0,10),
    teamCount: state.teams.length,
    groupCount: state.groups.length,
    champion: standings.championName,
    runnerUp: standings.runnerUpName,
    thirdPlace: standings.thirdPlaceNames, // 配列（3位決定戦なしの場合は2チーム同着のことがある）
  };
  state.history = [entry, ...state.history];
  state.savedThisTournament = true;
  await persistHistory(state.history);
  render();
}
async function deleteHistoryEntry(id){
  state.history = state.history.filter(h=>h.id!==id);
  await persistHistory(state.history);
  render();
  showToast('大会履歴を削除しました');
}

/* ============================= 棄権・不戦敗 ============================= */
function resetTournament(){
  state.stage = 'setup';
  state.previousStage = 'setup';
  state.tournamentName = '';
  state.teams = [];
  state.numGroups = 1;
  state.groups = [];
  state.matches = [];
  state.manualOrder = {};
  state.advanceChecked = {};
  state.advanceOrder = [];
  state.bracket = null;
  state.schedule = [];
  state.scheduleWarnings = [];
  state.withdrawnTeams = {};
  state.savedThisTournament = false;
  state.holdThirdPlace = false;
  clearAutosave();
  render();
}

function processWithdrawal(teamId){
  state.withdrawnTeams[teamId] = true;

  // 予選：未消化の試合を不戦敗として確定（相手が不戦勝）
  state.matches.forEach(m=>{
    if(m.a!==teamId && m.b!==teamId) return;
    const hasScore = m.scoreA!==null && m.scoreB!==null && m.scoreA!=='' && m.scoreB!=='';
    if(hasScore || m.forfeitWinner) return; // すでに結果がある試合は変更しない
    const opponent = m.a===teamId ? m.b : m.a;
    if(state.withdrawnTeams[opponent]) return; // 両者棄権は保留（無効試合のまま）
    m.forfeitWinner = opponent;
    m.forfeitCausedBy = teamId;
  });

  // 決勝トーナメント：現在対戦中／これから対戦予定のカードを不戦敗処理
  if(state.bracket){
    state.bracket.rounds.forEach(round=>{
      round.forEach(m=>{
        if(m.a!==teamId && m.b!==teamId) return;
        if(matchWinner(m)) return; // すでに決着済み
        const opponent = m.a===teamId ? m.b : m.a;
        if(opponent===null || opponent==='BYE') return; // 対戦相手がまだ決まっていない
        if(state.withdrawnTeams[opponent]) return;
        m.forfeitWinner = opponent;
        m.forfeitCausedBy = teamId;
      });
    });
    propagateByes();
  }
  render();
}
function undoWithdrawal(teamId){
  delete state.withdrawnTeams[teamId];
  state.matches.forEach(m=>{
    if(m.forfeitCausedBy===teamId){ m.forfeitWinner=null; m.forfeitCausedBy=null; }
  });
  if(state.bracket){
    state.bracket.rounds.forEach(round=> round.forEach(m=>{
      if(m.forfeitCausedBy===teamId){ m.forfeitWinner=null; m.forfeitCausedBy=null; }
    }));
    propagateByes();
  }
  render();
  showToast('棄権を取り消しました');
}

/* ============================= EXCEL EXPORT ============================= */
function roundLabelFor(totalRounds, ri){
  const remaining = totalRounds-ri;
  if(remaining===1) return '決勝';
  if(remaining===2) return '準決勝';
  if(remaining===3) return '準々決勝';
  return `${ri+1}回戦`;
}
function scoreText(v){ return (v===null||v==='') ? '' : v; }

function exportToExcel(){
  if(typeof XLSX==='undefined'){
    showAlertModal('Excel出力ライブラリの読み込みに失敗しました。インターネット接続を確認してもう一度お試しください。');
    return;
  }
  const wb = XLSX.utils.book_new();

  // シート1: 大会情報
  const infoRows = [
    ['大会名', state.tournamentName && state.tournamentName.trim() ? state.tournamentName.trim() : '（未設定）'],
    ['出力日', new Date().toISOString().slice(0,10)],
    ['参加チーム数', state.teams.length],
    ['予選グループ数', state.groups.length],
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(infoRows), '大会情報');

  // シート2: 予選_対戦スケジュール／結果
  if(state.matches.length){
    const rows = [['No','グループ','チームA','スコアA','スコアB','チームB','勝者']];
    const order = (state.schedule && state.schedule.length) ? state.schedule : state.matches.map(m=>m.id);
    order.forEach((mid,i)=>{
      const m = matchById(mid);
      if(!m) return;
      const groupLabel = state.groups.length>1 ? `グループ${String.fromCharCode(65+m.groupIdx)}` : '';
      let winner = '';
      const hasScores = m.scoreA!==null && m.scoreB!==null && m.scoreA!=='' && m.scoreB!=='';
      if(m.forfeitWinner){
        winner = `${teamName(m.forfeitWinner)}（不戦勝）`;
      } else if(hasScores){
        if(Number(m.scoreA)>Number(m.scoreB)) winner = teamName(m.a);
        else if(Number(m.scoreB)>Number(m.scoreA)) winner = teamName(m.b);
        else winner = '引き分け';
      }
      rows.push([i+1, groupLabel, teamName(m.a), scoreText(m.scoreA), scoreText(m.scoreB), teamName(m.b), winner]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), '予選_対戦結果');
  }

  // シート3: 予選_順位表（グループ別）
  if(state.groups.length){
    const rows = [['グループ','順位','チーム','勝','分','敗','勝点','得点','失点','得失点差']];
    state.groups.forEach((_, gi)=>{
      const groupLabel = state.groups.length>1 ? `グループ${String.fromCharCode(65+gi)}` : '全体';
      calcGroupStandings(gi).forEach(s=>{
        rows.push([groupLabel, s.rank, s.name, s.wins, s.draws, s.losses, s.points, s.pf, s.pa, s.diff]);
      });
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), '予選_順位表');
  }

  // シート4: 決勝トーナメント
  if(state.bracket){
    const rows = [['ラウンド','対戦カード','チームA','スコアA','スコアB','チームB','勝者']];
    const rounds = state.bracket.rounds;
    rounds.forEach((round, ri)=>{
      const label = roundLabelFor(rounds.length, ri);
      round.forEach((m, mi)=>{
        const aName = m.a===null ? '（未定）' : (m.a==='BYE' ? '不戦勝' : teamName(m.a));
        const bName = m.b===null ? '（未定）' : (m.b==='BYE' ? '不戦勝' : teamName(m.b));
        let winnerName = m.winner ? (m.winner==='BYE' ? '' : teamName(m.winner)) : '';
        if(m.forfeitWinner) winnerName += '（不戦勝）';
        rows.push([label, `${ri+1}-${mi+1}`, aName, scoreText(m.scoreA), scoreText(m.scoreB), bName, winnerName]);
      });
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), '決勝トーナメント');
  }

  // シート5: 大会履歴（保存済みがあれば）
  if(state.history.length){
    const rows = [['大会名','日付','チーム数','グループ数','優勝','準優勝','3位']];
    state.history.forEach(h=>{
      rows.push([h.name, h.date, h.teamCount, h.groupCount, h.champion, h.runnerUp || '', (h.thirdPlace||[]).join('・')]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), '大会履歴');
  }

  const baseName = (state.tournamentName && state.tournamentName.trim()) ? state.tournamentName.trim() : '大会結果';
  const safeName = baseName.replace(/[\\/:*?"<>|]/g,'_');
  XLSX.writeFile(wb, `${safeName}.xlsx`);
  showToast('📊 Excelファイルをダウンロードしました');
}

/* ---- schedule ordering ----
   条件2: 同グループ内で同じチームが連戦にならない順序を探す（総当たりの試合を並べ替え）
   小規模グループ（3〜4チーム等）では数学的に完全回避が不可能な場合があるため、
   その場合は「連戦の発生回数が最も少ない並び」を採用し、警告として残す。
*/
function orderGroupMatches(matches){
  if(matches.length<=1) return {order: matches.slice(), conflicts: 0};
  let best = null, bestConflicts = Infinity;
  const attempts = Math.min(600, Math.max(120, matches.length*40));
  for(let attempt=0; attempt<attempts; attempt++){
    const remaining = shuffle(matches.slice());
    const result = [];
    let last = null;
    let conflicts = 0;
    while(remaining.length){
      let idx = remaining.findIndex(m=> !last || (m.a!==last.a && m.a!==last.b && m.b!==last.a && m.b!==last.b));
      if(idx===-1){ idx = 0; conflicts++; }
      const [chosen] = remaining.splice(idx,1);
      result.push(chosen);
      last = chosen;
    }
    if(conflicts < bestConflicts){
      bestConflicts = conflicts;
      best = result;
      if(bestConflicts===0) break;
    }
  }
  return { order: best, conflicts: bestConflicts };
}

function interleaveGroups(sequences){
  // 条件1: 全体スケジュールで同グループが連続しないよう、残数が最も多いグループから優先的に選ぶ
  const queues = sequences.map((seq,gi)=>({gi, items: seq.slice()}));
  const result = [];
  let lastGi = null;
  let conflicts = 0;
  while(true){
    const avail = queues.filter(q=>q.items.length>0);
    if(avail.length===0) break;
    let candidates = avail.filter(q=>q.gi!==lastGi);
    if(candidates.length===0){ candidates = avail; conflicts++; }
    candidates.sort((a,b)=>b.items.length-a.items.length);
    const chosen = candidates[0];
    result.push({match: chosen.items.shift(), groupIdx: chosen.gi});
    lastGi = chosen.gi;
  }
  return { order: result, conflicts };
}

function buildSchedule(){
  const perGroup = state.groups.map((_, gi)=>{
    const gMatches = state.matches.filter(m=>m.groupIdx===gi);
    return orderGroupMatches(gMatches);
  });
  const interleaved = interleaveGroups(perGroup.map(p=>p.order));
  state.schedule = interleaved.order.map(x=>x.match.id);
  state.scheduleWarnings = [];
  perGroup.forEach((p, gi)=>{
    if(p.conflicts>0){
      state.scheduleWarnings.push(`グループ${String.fromCharCode(65+gi)}：チーム数が少ないため、${p.conflicts}件の連戦をどうしても避けられませんでした（最小になるよう配置しています）。`);
    }
  });
  if(interleaved.conflicts>0){
    state.scheduleWarnings.push(`グループの試合数に偏りがあるため、${interleaved.conflicts}件だけ同グループの試合が連続しています。`);
  }
}


/* ============================= STANDINGS ============================= */
function calcGroupStandings(groupIdx){
  const groupTeamIds = state.groups[groupIdx];
  const gMatches = state.matches.filter(m=>m.groupIdx===groupIdx);
  const stats = {};
  groupTeamIds.forEach(id=>{
    stats[id] = {id, wins:0, draws:0, losses:0, played:0, pf:0, pa:0};
  });
  gMatches.forEach(m=>{
    if(m.forfeitWinner){
      const winner = m.forfeitWinner, loser = m.a===winner ? m.b : m.a;
      if(stats[winner] && stats[loser]){
        stats[winner].played++; stats[winner].wins++;
        stats[loser].played++; stats[loser].losses++;
      }
      return;
    }
    if(m.scoreA===null || m.scoreB===null || m.scoreA===''||m.scoreB==='') return;
    const sa=Number(m.scoreA), sb=Number(m.scoreB);
    if(isNaN(sa)||isNaN(sb)) return;
    stats[m.a].played++; stats[m.b].played++;
    stats[m.a].pf+=sa; stats[m.a].pa+=sb;
    stats[m.b].pf+=sb; stats[m.b].pa+=sa;
    if(sa>sb){ stats[m.a].wins++; stats[m.b].losses++; }
    else if(sb>sa){ stats[m.b].wins++; stats[m.a].losses++; }
    else { stats[m.a].draws++; stats[m.b].draws++; }
  });
  Object.values(stats).forEach(s=>{ s.points = s.wins*3 + s.draws; });

  // manual order fallback (used as final stable tiebreaker)
  const manual = state.manualOrder[groupIdx] || groupTeamIds;
  const manualIndex = {};
  manual.forEach((id,i)=>manualIndex[id]=i);

  function headToHeadPoints(ids){
    // 勝点（勝ち3・分け1・負け0）を対象チーム同士の対戦のみで集計
    const idSet = new Set(ids);
    const h2h = {}; ids.forEach(id=>h2h[id]=0);
    gMatches.forEach(m=>{
      if(!idSet.has(m.a) || !idSet.has(m.b)) return;
      if(m.forfeitWinner){ h2h[m.forfeitWinner]+=3; return; }
      if(m.scoreA===null||m.scoreB===null||m.scoreA===''||m.scoreB==='') return;
      const sa=Number(m.scoreA), sb=Number(m.scoreB);
      if(isNaN(sa)||isNaN(sb)) return;
      if(sa>sb) h2h[m.a]+=3;
      else if(sb>sa) h2h[m.b]+=3;
      else { h2h[m.a]+=1; h2h[m.b]+=1; }
    });
    return h2h;
  }

  let list = groupTeamIds.slice();
  // group by points first (勝ち3・分け1・負け0)
  const byPoints = {};
  list.forEach(id=>{
    const p = stats[id].points;
    (byPoints[p] = byPoints[p]||[]).push(id);
  });
  const pointLevels = Object.keys(byPoints).map(Number).sort((a,b)=>b-a);
  let ordered = [];
  pointLevels.forEach(p=>{
    let tied = byPoints[p];
    if(tied.length===1){ ordered.push(tied[0]); return; }
    const h2h = headToHeadPoints(tied);
    tied = tied.slice().sort((x,y)=>{
      const diffX = stats[x].pf-stats[x].pa, diffY = stats[y].pf-stats[y].pa;
      if(diffY!==diffX) return diffY-diffX;
      if(h2h[y]!==h2h[x]) return h2h[y]-h2h[x];
      if(stats[y].pf!==stats[x].pf) return stats[y].pf-stats[x].pf;
      return manualIndex[x]-manualIndex[y];
    });
    ordered.push(...tied);
  });
  return ordered.map((id,i)=>({rank:i+1, id, name:teamName(id), ...stats[id], diff: stats[id].pf-stats[id].pa}));
}

function combinedRanking(){
  // merge all groups' standings by rank-position, then by points/diff within each position band
  const perGroup = state.groups.map((g,i)=>calcGroupStandings(i));
  const maxLen = Math.max(0,...perGroup.map(g=>g.length));
  const combined = [];
  for(let pos=0; pos<maxLen; pos++){
    const band = perGroup.map(g=>g[pos]).filter(Boolean);
    band.sort((a,b)=>{
      if(b.points!==a.points) return b.points-a.points;
      if(b.diff!==a.diff) return b.diff-a.diff;
      return 0;
    });
    combined.push(...band);
  }
  return combined;
}

/* ---- 軽い通知（トースト） ---- */
let toastContainer = null;
function showToast(message){
  if(!toastContainer){
    toastContainer = document.createElement('div');
    toastContainer.style.cssText = 'position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:10000;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;';
    document.body.appendChild(toastContainer);
  }
  const toast = document.createElement('div');
  toast.textContent = message;
  toast.style.cssText = 'background:var(--navy);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:700;box-shadow:0 6px 18px rgba(18,33,58,0.3);opacity:0;transform:translateY(8px);transition:opacity .2s ease, transform .2s ease;';
  toastContainer.appendChild(toast);
  requestAnimationFrame(()=>{ toast.style.opacity='1'; toast.style.transform='translateY(0)'; });
  setTimeout(()=>{
    toast.style.opacity='0'; toast.style.transform='translateY(8px)';
    setTimeout(()=>{ if(toast.parentNode) toast.parentNode.removeChild(toast); }, 250);
  }, 2200);
}

function captureUiState(){
  const active = document.activeElement;
  let key = null, selStart = null, selEnd = null;
  if(active && active.getAttribute && active.getAttribute('data-input-key')){
    key = active.getAttribute('data-input-key');
    try{ selStart = active.selectionStart; selEnd = active.selectionEnd; }catch(e){}
  }
  return { key, selStart, selEnd, scrollX: window.scrollX, scrollY: window.scrollY };
}
let isRestoringFocus = false;
function restoreUiState(ui){
  if(!ui) return;
  if(ui.key){
    const el2 = document.querySelector(`[data-input-key="${ui.key}"]`);
    if(el2){
      isRestoringFocus = true;
      el2.focus({preventScroll:true});
      isRestoringFocus = false;
      if(ui.selStart!==null && ui.selStart!==undefined){
        try{ el2.setSelectionRange(ui.selStart, ui.selEnd); }catch(e){}
      }
    }
  }
  window.scrollTo(ui.scrollX, ui.scrollY);
}
function render(){
  const ui = captureUiState();
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(renderBoard());
  if(state.stage==='setup') app.appendChild(renderSetup());
  if(state.stage==='groups') app.appendChild(renderGroups());
  if(state.stage==='prelim') app.appendChild(renderPrelim());
  if(state.stage==='advance') app.appendChild(renderAdvance());
  if(state.stage==='history') app.appendChild(renderHistory());
  if(state.stage==='withdraw') app.appendChild(renderWithdraw());
  if(state.stage==='bracket'){
    const panel = renderBracket();
    app.appendChild(panel);
    drawBracketConnectors(panel);
  }
  scheduleAutosave();
  restoreUiState(ui);
}
let renderDebounceTimer = null;

}

      const row = el(`

          <div style="flex:1;">
            <div class="name">${escapeHtml(t.name)}</div>
            ${withdrawn?'<div class="meta" style="color:var(--lose);font-weight:700;">🚩 棄権済み（未消化の試合を不戦敗処理しました）</div>':''}
          </div>
        </div>
      `);
      const btn = el(withdrawn
        ? `<button class="btn-ghost btn-sm">取り消す</button>`
        : `<button class="btn-danger">棄権にする</button>`);
      btn.addEventListener('click', ()=>{
        if(withdrawn){
          undoWithdrawal(t.id);
        } else {
          showConfirmModal(`「${t.name}」を棄権扱いにします。まだ結果が入っていない試合は自動的に不戦敗として確定されます。よろしいですか？`, ()=>processWithdrawal(t.id));
        }
      });
      row.appendChild(btn);
      list.appendChild(row);
    });
  }
  wrap.querySelector('#backFromWithdraw').addEventListener('click', ()=>{
    state.stage = state.previousStage || 'setup';
    render();
  });
  return wrap;
}

/* ---- STAGE: history ---- */

/* ---- STAGE 1: setup ---- */

  const wrap = el(`
    <div class="panel">
      <h2>大会名</h2>
      <p class="desc">履歴や画面上部の見出しに使われます（あとから変更できます）。</p>
      <div class="row" style="margin-bottom:24px;">

    list.appendChild(el(`<p class="small-note" style="margin-bottom:10px;">⚠ すでに予選グループが作成されているため、チームの削除はできません。参加できなくなったチームは「🚩 棄権管理」から棄権にしてください。</p>`));
  }
  if(state.teams.length===0){
    list.appendChild(el(`<div class="empty-hint">まだチームが登録されていません。「＋ チームを追加」から始めましょう。</div>`));

      const row = el(`
        <div class="team-chip">
          <span class="num">${i+1}</span>

        </div>
      `);
      row.querySelector('input').addEventListener('input', e=>{
        t.name = e.target.value;
      });
      const removeBtn = row.querySelector('[data-remove]');
      if(removeBtn){
        removeBtn.addEventListener('click', ()=>{
          state.teams = state.teams.filter(x=>x.id!==t.id);
          render();
        });
      }
      list.appendChild(row);
    });
  }
  wrap.querySelector('#addTeamBtn').addEventListener('click', ()=>{
    state.teams.push({id: nextTeamId++, name: `チーム${state.teams.length+1}`});
    render();
  });
  const goBtn = wrap.querySelector('#toGroupsBtn');
  if(goBtn && !goBtn.disabled){
    goBtn.addEventListener('click', ()=>{
      state.stage='groups';
      if(state.groups.length===0) autoAssignGroups();
      render();
    });

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function clampScoreValue(raw){
  if(raw===''||raw===null||raw===undefined) return null;
  let n = Number(raw);
  if(isNaN(n)) return null;
  n = Math.floor(Math.abs(n));
  if(n>999) n=999;
  return String(n);
}

/* ---- STAGE 2: groups ---- */
function autoAssignGroups(){
  const shuffled = shuffle(state.teams.map(t=>t.id));
  const groups = Array.from({length: state.numGroups}, ()=>[]);
  shuffled.forEach((id,i)=> groups[i % state.numGroups].push(id));
  state.groups = groups;
}
function renderGroups(){
  const wrap = el(`
    <div class="panel">
      <h2>予選グループを組む</h2>
      <p class="desc">グループ数を選び、自動振り分け・手動調整のあと予選の総当たり表を作成します。</p>
      <div class="row">
        <label style="font-size:13px;font-weight:700;color:var(--sub);">グループ数</label>
        <select id="groupCount"></select>
        <button class="btn-ghost btn-sm" id="reshuffleBtn">🔀 ランダム再振り分け</button>
      </div>
      <div class="group-grid" id="groupGrid"></div>
      <div class="footer-nav">
        <button class="btn-ghost" id="backToSetup">← チーム編集に戻る</button>
        <button class="btn-primary" id="toPrelimBtn">総当たり表を作成 →</button>
      </div>
    </div>
  `);
  const sel = wrap.querySelector('#groupCount');
  const maxGroups = Math.max(1, Math.floor(state.teams.length/2));
  for(let i=1;i<=maxGroups;i++){
    const opt = document.createElement('option');
    opt.value=i; opt.textContent = i===1? '1（総当たり一本）' : `${i}グループ`;
    if(i===state.numGroups) opt.selected=true;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', e=>{
    state.numGroups = Number(e.target.value);
    autoAssignGroups();
    render();
  });
  wrap.querySelector('#reshuffleBtn').addEventListener('click', ()=>{ autoAssignGroups(); render(); showToast('🔀 チームを再振り分けしました'); });

  const grid = wrap.querySelector('#groupGrid');
  state.groups.forEach((teamIds, gi)=>{
    const card = el(`<div class="group-card"><h3>グループ ${String.fromCharCode(65+gi)}（${teamIds.length}チーム）</h3></div>`);
    teamIds.forEach(id=>{
      const row = el(`
        <div class="group-team">
          <span>${escapeHtml(teamName(id))}</span>
          ${state.groups.length>1 ? '<select></select>' : ''}
        </div>
      `);
      if(state.groups.length>1){
        const moveSel = row.querySelector('select');
        moveSel.appendChild(el(`<option value="">移動...</option>`));
        state.groups.forEach((_, targetGi)=>{
          if(targetGi===gi) return;
          moveSel.appendChild(el(`<option value="${targetGi}">→ グループ${String.fromCharCode(65+targetGi)}へ</option>`));
        });
        moveSel.addEventListener('change', e=>{
          const target = Number(e.target.value);
          if(isNaN(target)) return;
          state.groups[gi] = state.groups[gi].filter(x=>x!==id);
          state.groups[target].push(id);
          render();
        });
      }
      card.appendChild(row);
    });
    grid.appendChild(card);
  });

  wrap.querySelector('#backToSetup').addEventListener('click', ()=>{ state.stage='setup'; render(); });
  wrap.querySelector('#toPrelimBtn').addEventListener('click', ()=>{
    const hasResults = state.matches.some(m=> (m.scoreA!==null&&m.scoreA!=='') || (m.scoreB!==null&&m.scoreB!=='') || m.forfeitWinner);
    const proceed = ()=>{ generatePrelimMatches(); state.stage='prelim'; render(); };
    if(hasResults){
      showConfirmModal('すでに入力済みの予選結果があります。ここで作り直すと、入力済みのスコアはすべて消えます。よろしいですか？', proceed);
    } else {
      proceed();
    }
  });
  return wrap;
}

function generatePrelimMatches(){
  state.matches = [];
  state.manualOrder = {};
  state.groups.forEach((teamIds, gi)=>{
    state.manualOrder[gi] = teamIds.slice();
    for(let i=0;i<teamIds.length;i++){
      for(let j=i+1;j<teamIds.length;j++){
        state.matches.push({id: nextMatchId++, groupIdx: gi, a: teamIds[i], b: teamIds[j], scoreA:null, scoreB:null, forfeitWinner:null, forfeitCausedBy:null});
      }
    }
  });
  buildSchedule();
}
function matchById(id){ return state.matches.find(m=>m.id===id); }

/* ---- STAGE 3: prelim ---- */
let activeGroupTab = 0;
let prelimView = 'schedule'; // 'schedule' | 'groups'

function renderMatchRowEl(m, opts){
  opts = opts || {};
  const badge = opts.badge ? `<span class="rank-badge" style="margin-right:4px;">${opts.badge}</span>` : '';
  const groupTag = opts.groupLabel ? `<span class="tab" style="padding:3px 9px;font-size:11px;cursor:default;">${opts.groupLabel}</span>` : '';

  if(m.forfeitWinner){
    const winner = m.forfeitWinner, loser = m.a===winner ? m.b : m.a;
    const forfeitTag = `<span class="tab" style="padding:3px 9px;font-size:11px;cursor:default;background:#FBEEEE;color:var(--lose);">不戦勝・不戦敗</span>`;
    return el(`
      <div class="match-row match-decided">
        ${badge}${groupTag}
        <div class="match-team left ${m.a===winner?'winner':'loser'}">${escapeHtml(teamName(m.a))}</div>
        <span class="vs" style="min-width:76px;text-align:center;">不戦勝</span>
        <div class="match-team ${m.b===winner?'winner':'loser'}">${escapeHtml(teamName(m.b))}</div>
        ${forfeitTag}
      </div>
    `);
  }

  const hasScores = m.scoreA!==null && m.scoreB!==null && m.scoreA!=='' && m.scoreB!=='';
  const decided = hasScores && Number(m.scoreA)!==Number(m.scoreB);
  const drawn = hasScores && Number(m.scoreA)===Number(m.scoreB);
  let aCls='', bCls='';
  if(decided){
    if(Number(m.scoreA)>Number(m.scoreB)){ aCls='winner'; bCls='loser'; } else { bCls='winner'; aCls='loser'; }
  }
  const drawTag = drawn ? `<span class="tab" style="padding:3px 9px;font-size:11px;cursor:default;background:#FBF3E4;color:var(--amber-dark);">引き分け</span>` : '';
  const nextTag = opts.isNext ? `<span class="tab" style="padding:3px 9px;font-size:11px;cursor:default;background:var(--amber);color:var(--navy);font-weight:800;">▶ 次の試合</span>` : '';
  const row = el(`
    <div class="match-row ${decided?'match-decided':''} ${drawn?'match-drawn':''}" style="${opts.isNext?'background:#FDF6E8;border-radius:8px;box-shadow:inset 3px 0 0 var(--amber);':''}">
      ${badge}${groupTag}${nextTag}
      <div class="match-team left ${aCls}">${escapeHtml(teamName(m.a))}</div>
      <input type="number" min="0" max="999" step="1" inputmode="numeric" pattern="[0-9]*" data-input-key="prelim-${m.id}-a" value="${m.scoreA===null?'':m.scoreA}">
      <span class="vs">−</span>
      <input type="number" min="0" max="999" step="1" inputmode="numeric" pattern="[0-9]*" data-input-key="prelim-${m.id}-b" value="${m.scoreB===null?'':m.scoreB}">
      <div class="match-team ${bCls}">${escapeHtml(teamName(m.b))}</div>
      ${drawTag}
    </div>
  `);
  const inputs = row.querySelectorAll('input');
  inputs[0].addEventListener('input', e=>{ m.scoreA = clampScoreValue(e.target.value); scheduleRender(); });
  inputs[1].addEventListener('input', e=>{ m.scoreB = clampScoreValue(e.target.value); scheduleRender(); });
  return row;
}

function renderPrelim(){
  if(activeGroupTab >= state.groups.length) activeGroupTab = 0;
  const wrap = el(`
    <div class="panel">
      <h2>予選結果を入力</h2>
      <p class="desc">対戦スケジュール順、またはグループ別に切り替えて表示できます。スコアを入れると順位表が自動で更新されます。</p>
      <div class="tabbar" id="viewTabs">
        <div class="tab" data-view="schedule">📋 対戦スケジュール</div>
        <div class="tab" data-view="groups">グループ別・順位表</div>
      </div>
      <div id="prelimBody"></div>
      <div class="footer-nav">
        <button class="btn-ghost" id="backToGroups">← グループ編成に戻る</button>
        <button class="btn-primary" id="toAdvanceBtn">進出チームを決める →</button>
      </div>
    </div>
  `);
  wrap.querySelectorAll('#viewTabs .tab').forEach(t=>{
    if(t.dataset.view===prelimView) t.classList.add('active');
    t.addEventListener('click', ()=>{ prelimView=t.dataset.view; render(); });
  });

  const body = wrap.querySelector('#prelimBody');
  if(prelimView==='schedule'){
    body.appendChild(renderScheduleView());
  } else {
    body.appendChild(renderGroupsView());
  }

  wrap.querySelector('#backToGroups').addEventListener('click', ()=>{ state.stage='groups'; render(); });
  wrap.querySelector('#toAdvanceBtn').addEventListener('click', ()=>{
    setupAdvanceDefaults();

function renderScheduleView(){
  const box = el(`<div></div>`);
  const head = el(`
    <div class="row" style="justify-content:space-between;margin-bottom:10px;">
      <p class="small-note" style="margin:0;">① 同じグループの試合が連続しない　② グループ内では同じチームが連戦にならない　の2条件を考慮した順番です。</p>
      <button class="btn-ghost btn-sm" id="reshuffleSchedule">🔀 スケジュールを組み直す</button>
    </div>
  `);
  box.appendChild(head);
  head.querySelector('#reshuffleSchedule').addEventListener('click', ()=>{ buildSchedule(); render(); showToast('🔀 スケジュールを組み直しました'); });

  if(state.scheduleWarnings.length){
    const warn = el(`<div class="panel" style="margin-top:0;margin-bottom:14px;border-color:#EAC6C6;background:#FBEEEE;padding:14px 16px;"></div>`);
    state.scheduleWarnings.forEach(w=> warn.appendChild(el(`<p class="small-note" style="color:var(--lose);margin:4px 0;">⚠ ${escapeHtml(w)}</p>`)));
    box.appendChild(warn);
  }

  const listBox = el(`<div class="panel" style="margin-top:0;border-color:#E5EAF2;background:var(--paper);"></div>`);
  const nextMid = state.schedule.find(mid=>{
    const m = matchById(mid);
    if(!m) return false;
    const hasScores = m.scoreA!==null && m.scoreA!=='' && m.scoreB!==null && m.scoreB!=='';
    return !hasScores && !m.forfeitWinner;
  });
  state.schedule.forEach((mid, i)=>{
    const m = matchById(mid);
    if(!m) return;
    const groupLabel = state.groups.length>1 ? `グループ${String.fromCharCode(65+m.groupIdx)}` : null;
    listBox.appendChild(renderMatchRowEl(m, {badge: i+1, groupLabel, isNext: mid===nextMid}));
  });
  box.appendChild(listBox);
  return box;
}

function renderGroupsView(){
  const box = el(`<div></div>`);
  const tabbar = el(`<div class="tabbar" id="groupTabs"></div>`);
  state.groups.forEach((_, gi)=>{
    const tab = el(`<div class="tab ${gi===activeGroupTab?'active':''}">グループ${String.fromCharCode(65+gi)}</div>`);
    tab.addEventListener('click', ()=>{ activeGroupTab=gi; render(); });
    tabbar.appendChild(tab);
  });
  box.appendChild(tabbar);

  const gi = activeGroupTab;
  const matchesBox = el(`<div class="panel" style="margin-top:0;border-color:#E5EAF2;background:var(--paper);"><h2 style="font-size:14px;">対戦カード</h2></div>`);
  const gMatches = state.matches.filter(m=>m.groupIdx===gi);
  gMatches.forEach(m=> matchesBox.appendChild(renderMatchRowEl(m)));
  box.appendChild(matchesBox);

  const standings = calcGroupStandings(gi);
  const standBox = el(`<div class="panel" style="margin-top:14px;border-color:#E5EAF2;"><h2 style="font-size:14px;">順位表</h2></div>`);
  const table = el(`
    <table class="standings">
      <thead><tr><th>順位</th><th style="text-align:left;">チーム</th><th>勝</th><th>分</th><th>敗</th><th>勝点</th><th>得点</th><th>失点</th><th>得失点差</th></tr></thead>
      <tbody></tbody>
    </table>
  `);
  const tbody = table.querySelector('tbody');
  standings.forEach(s=>{
    tbody.appendChild(elRow(`
      <tr>
        <td><span class="rank-badge ${s.rank<=2?'top':''}">${s.rank}</span></td>
        <td class="name">${escapeHtml(s.name)}${state.withdrawnTeams[s.id]?' <span style="color:var(--lose);font-size:11px;font-weight:800;">🚩棄権</span>':''}</td>
        <td>${s.wins}</td>
        <td>${s.draws}</td>
        <td>${s.losses}</td>
        <td><b>${s.points}</b></td>
        <td>${s.pf}</td>
        <td>${s.pa}</td>
        <td>${s.diff>0?'+':''}${s.diff}</td>
      </tr>
    `));
  });
  standBox.appendChild(el(`<div class="table-scroll"></div>`)).appendChild(table);
  standBox.appendChild(el(`<p class="small-note">勝ち3点・引き分け1点・負け0点の勝点で順位を決め、同点の場合は得失点差 → 直接対決の結果 → 総得点 の順で自動判定しています。</p>`));
  box.appendChild(standBox);
  return box;
}

/* ---- STAGE 4: advance ---- */
function setupAdvanceDefaults(){
  const combined = combinedRanking();
  state.advanceOrder = combined.map(c=>c.id);
  state.advanceChecked = {};
  combined.forEach(c=> state.advanceChecked[c.id] = true);
}
function renderAdvance(){
  const combined = combinedRanking();
  // keep advanceOrder in sync (in case matches changed) while respecting manual reordering already applied
  const idsInCombined = combined.map(c=>c.id);
  if(!state.advanceOrder || state.advanceOrder.length===0){
    state.advanceOrder = idsInCombined;
  } else {
    // append any new ids, remove missing
    state.advanceOrder = state.advanceOrder.filter(id=>idsInCombined.includes(id));
    idsInCombined.forEach(id=>{ if(!state.advanceOrder.includes(id)) state.advanceOrder.push(id); });
  }
  const infoById = {};
  combined.forEach(c=> infoById[c.id]=c);

  const wrap = el(`
    <div class="panel">
      <h2>決勝トーナメント進出チームを決める</h2>
      <p class="desc">予選の総合順位です。並び替え・チェックの調整ができます。チェックしたチームがシード順に決勝トーナメントへ進みます。</p>
      <div class="row" style="margin-bottom:14px;">
        <button class="btn-ghost btn-sm" data-quick="all">全チーム進出</button>
        <button class="btn-ghost btn-sm" data-quick="2">各組上位2</button>
        <button class="btn-ghost btn-sm" data-quick="4">上位4</button>
        <button class="btn-ghost btn-sm" data-quick="8">上位8</button>
      </div>
      <div id="rankList"></div>
      <label style="display:flex;align-items:center;gap:8px;margin-top:18px;font-size:13.5px;font-weight:700;cursor:pointer;">
        <input type="checkbox" id="thirdPlaceCheck" ${state.holdThirdPlace?'checked':''}>
        3位決定戦を行う（準決勝で敗れた2チームで対戦。行わない場合は2チームとも3位として記録します）
      </label>
      <div class="footer-nav">
        <button class="btn-ghost" id="backToPrelim">← 予選結果に戻る</button>
        <button class="btn-primary" id="toBracketBtn">決勝トーナメントを組む →</button>
      </div>
      <p class="small-note" id="countHint"></p>
    </div>
  `);
  wrap.querySelector('#thirdPlaceCheck').addEventListener('change', e=>{
    state.holdThirdPlace = e.target.checked;
  });

  const list = wrap.querySelector('#rankList');
  state.advanceOrder.forEach((id, i)=>{
    const info = infoById[id];
    const checked = !!state.advanceChecked[id];
    const row = el(`
      <div class="rank-row ${checked?'selected':''}">
        <span class="rank-badge ${checked?'top':''}">${i+1}</span>
        <label style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;">
          <input type="checkbox" ${checked?'checked':''}>
          <span class="name">${escapeHtml(teamName(id))}</span>
        </label>
        <span class="meta">${info?`${info.wins}勝${info.draws}分${info.losses}敗（勝点${info.points}）/ 得失点差 ${info.diff>0?'+':''}${info.diff}`:''}</span>
        <div class="move-btns">
          <button class="btn-icon btn-sm" data-up="${id}" ${i===0?'disabled':''}>↑</button>
          <button class="btn-icon btn-sm" data-down="${id}" ${i===state.advanceOrder.length-1?'disabled':''}>↓</button>
        </div>
      </div>
    `);
    row.querySelector('input[type=checkbox]').addEventListener('change', e=>{
      state.advanceChecked[id] = e.target.checked;
      render();
    });
    const up = row.querySelector('[data-up]');
    const down = row.querySelector('[data-down]');
    if(up) up.addEventListener('click', ()=>{
      const idx = state.advanceOrder.indexOf(id);
      if(idx>0){ [state.advanceOrder[idx-1], state.advanceOrder[idx]] = [state.advanceOrder[idx], state.advanceOrder[idx-1]]; render(); }
    });
    if(down) down.addEventListener('click', ()=>{
      const idx = state.advanceOrder.indexOf(id);
      if(idx<state.advanceOrder.length-1){ [state.advanceOrder[idx+1], state.advanceOrder[idx]] = [state.advanceOrder[idx], state.advanceOrder[idx+1]]; render(); }
    });
    list.appendChild(row);
  });

  wrap.querySelectorAll('[data-quick]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const mode = btn.dataset.quick;
      if(mode==='all'){
        state.advanceOrder.forEach(id=> state.advanceChecked[id]=true);
      } else if(mode==='2'){
        state.advanceOrder.forEach(id=> state.advanceChecked[id]=false);
        state.groups.forEach((_,gi)=>{
          calcGroupStandings(gi).slice(0,2).forEach(s=> state.advanceChecked[s.id]=true);
        });
      } else {
        const n = Number(mode);
        state.advanceOrder.forEach((id,i)=> state.advanceChecked[id] = i<n);
      }
      render();
    });
  });

  const checkedCount = Object.values(state.advanceChecked).filter(Boolean).length;
  wrap.querySelector('#countHint').textContent = `現在 ${checkedCount} チームが進出予定です（2チーム以上必要）。`;
  wrap.querySelector('#backToPrelim').addEventListener('click', ()=>{ state.stage='prelim'; render(); });
  const goBtn = wrap.querySelector('#toBracketBtn');
  goBtn.disabled = checkedCount<2;
  goBtn.addEventListener('click', ()=>{
    if(checkedCount<2) return;
    generateBracket();
    state.stage='bracket';
    render();
  });
  return wrap;
}

/* ---- STAGE 5: bracket ---- */
function generateBracket(){
  const seeded = state.advanceOrder.filter(id=>state.advanceChecked[id]);
  const k = seeded.length;
  const p = nextPow2(k);
  const order = seedOrder(p); // sequence of seed numbers (1-indexed)
  const seedToTeam = {};
  for(let s=1;s<=p;s++) seedToTeam[s] = s<=k ? seeded[s-1] : 'BYE';
  const round0Slots = order.map(s=>seedToTeam[s]);

  const numRound0Matches = p/2;
  const round0 = [];
  for(let i=0;i<numRound0Matches;i++){
    const a = round0Slots[i*2];
    const b = round0Slots[i*2+1];
    round0.push(makeMatch(a,b));
  }
  const rounds = [round0];
  let curLen = numRound0Matches;
  while(curLen>1){
    curLen = curLen/2;
    const r = [];
    for(let i=0;i<curLen;i++) r.push(makeMatch(null,null));
    rounds.push(r);
  }
  state.bracket = { size:p, rounds, thirdPlaceMatch: (state.holdThirdPlace && rounds.length>=2) ? makeMatch(null,null) : null };
  state.savedThisTournament = false;
  propagateByes();
}
function makeMatch(a,b){
  const m = {a, b, scoreA:null, scoreB:null, winner:null, forfeitWinner:null, forfeitCausedBy:null};
  return m;
}
function matchWinner(m){
  if(m.forfeitWinner) return m.forfeitWinner;
  if(m.a==='BYE' && m.b && m.b!=='BYE') return m.b;
  if(m.b==='BYE' && m.a && m.a!=='BYE') return m.a;
  if(m.a===null || m.b===null) return null;
  if(m.a==='BYE' || m.b==='BYE') return null;
  if(m.scoreA===null||m.scoreB===null||m.scoreA===''||m.scoreB==='') return null;
  const sa=Number(m.scoreA), sb=Number(m.scoreB);
  if(isNaN(sa)||isNaN(sb)||sa===sb) return null;
  return sa>sb ? m.a : m.b;
}
function semifinalLoser(sm){
  if(!sm || sm.a==='BYE' || sm.b==='BYE') return null;
  const w = matchWinner(sm);
  if(!w) return null;
  return sm.a===w ? sm.b : sm.a;
}
function propagateByes(){
  const rounds = state.bracket.rounds;
  for(let r=0;r<rounds.length;r++){
    for(let i=0;i<rounds[r].length;i++){
      const m = rounds[r][i];
      const w = matchWinner(m);
      m.winner = w;
      if(r+1<rounds.length){
        const nextMatch = rounds[r+1][Math.floor(i/2)];
        if(i%2===0) nextMatch.a = w; else nextMatch.b = w;
      }
    }
  }
  const m3 = state.bracket.thirdPlaceMatch;
  if(m3 && rounds.length>=2){
    const semis = rounds[rounds.length-2];
    m3.a = semifinalLoser(semis[0]);
    m3.b = semifinalLoser(semis[1]);
    m3.winner = (m3.a && !m3.b) ? m3.a : (m3.b && !m3.a) ? m3.b : matchWinner(m3);
  }
}
function getFinalStandings(){
  if(!state.bracket) return null;
  const rounds = state.bracket.rounds;
  const finalRound = rounds[rounds.length-1];
  if(finalRound.length!==1) return null;
  const finalMatch = finalRound[0];
  const champion = matchWinner(finalMatch);
  if(!champion) return null;
  const runnerUp = finalMatch.a===champion ? finalMatch.b : finalMatch.a;
  let thirdPlaceIds = [];
  if(rounds.length>=2){
    const semis = rounds[rounds.length-2];
    const m3 = state.bracket.thirdPlaceMatch;
    if(m3){
      const w3 = (m3.a && !m3.b) ? m3.a : (m3.b && !m3.a) ? m3.b : matchWinner(m3);
      if(w3) thirdPlaceIds = [w3];
    } else {
      thirdPlaceIds = [semifinalLoser(semis[0]), semifinalLoser(semis[1])].filter(Boolean);
    }
  }
  return {
    championId: champion,
    championName: teamName(champion),
    runnerUpId: (runnerUp && runnerUp!=='BYE') ? runnerUp : null,
    runnerUpName: (runnerUp && runnerUp!=='BYE') ? teamName(runnerUp) : null,
    thirdPlaceNames: thirdPlaceIds.map(teamName),
  };
}

/* ============================= SNS用画像を保存 ============================= */
function matchScoreText(m){
  if(m.forfeitWinner) return '不戦勝';
  const hasScores = m.scoreA!==null && m.scoreA!=='' && m.scoreB!==null && m.scoreB!=='';
  return hasScores ? `${m.scoreA} - ${m.scoreB}` : '― : ―';
}

function buildBracketImageDOM(w, h, title){
  const isStory = h > w;
  const scale = w/1080;
  const pad = Math.round((isStory ? 70 : 50) * scale);
  const box = document.createElement('div');
  box.style.cssText = `width:${w}px;height:${h}px;background:#F7F8FA;display:flex;align-items:center;justify-content:center;font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;box-sizing:border-box;`;
  const inner = document.createElement('div');
  inner.style.cssText = `width:${w-pad*2}px;height:${h-pad*2}px;border:${Math.round(3*scale)}px solid #185FA5;border-radius:${Math.round(14*scale)}px;background:#fff;box-sizing:border-box;padding:${Math.round(30*scale)}px;display:flex;flex-direction:column;overflow:hidden;`;

  const header = document.createElement('div');
  header.style.cssText = `border-bottom:${Math.round(3*scale)}px solid #185FA5;padding-bottom:${Math.round(14*scale)}px;margin-bottom:${Math.round(18*scale)}px;text-align:center;flex:none;`;
  const titleEl = document.createElement('div');
  titleEl.textContent = title;
  titleEl.style.cssText = `font-size:${Math.round(32*scale)}px;font-weight:800;color:#12213A;`;
  const subEl = document.createElement('div');
  subEl.textContent = state.bracket ? 'TOURNAMENT BRACKET' : '予選対戦結果';
  subEl.style.cssText = `font-size:${Math.round(15*scale)}px;letter-spacing:.14em;color:#5C6B84;text-transform:uppercase;margin-top:${Math.round(4*scale)}px;`;
  header.appendChild(titleEl); header.appendChild(subEl);
  inner.appendChild(header);

  const table = document.createElement('table');
  table.style.cssText = `width:100%;border-collapse:collapse;font-size:${Math.round(18*scale)}px;table-layout:fixed;flex:1;`;
  const tbody = document.createElement('tbody');
  table.appendChild(tbody);

  function addSectionRow(text){
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = 3;
    td.textContent = text;
    td.style.cssText = `background:#185FA5;color:#fff;font-weight:800;font-size:${Math.round(14*scale)}px;letter-spacing:.08em;text-align:center;padding:${Math.round(8*scale)}px ${Math.round(10*scale)}px;`;
    tr.appendChild(td);
    tbody.appendChild(tr);
  }
  function addMatchRow(m){
    const aName = m.a==='BYE' ? '（不戦勝）' : (m.a ? teamName(m.a) : '（未定）');
    const bName = m.b==='BYE' ? '（不戦勝）' : (m.b ? teamName(m.b) : '（未定）');
    const w2 = m.winner;
    const aWin = w2 && m.a===w2, bWin = w2 && m.b===w2;
    const tr = document.createElement('tr');
    const tdA = document.createElement('td');
    tdA.textContent = aName;
    tdA.style.cssText = `border:1px solid #D3DAE6;padding:${Math.round(9*scale)}px ${Math.round(12*scale)}px;font-weight:700;text-align:right;width:42%;color:${aWin?'#185FA5':(w2?'#8A96AA':'#12213A')};`;
    const tdS = document.createElement('td');
    tdS.textContent = matchScoreText(m);
    tdS.style.cssText = `border:1px solid #D3DAE6;padding:${Math.round(9*scale)}px ${Math.round(12*scale)}px;text-align:center;background:#F2F6FB;width:16%;font-weight:800;`;
    const tdB = document.createElement('td');
    tdB.textContent = bName;
    tdB.style.cssText = `border:1px solid #D3DAE6;padding:${Math.round(9*scale)}px ${Math.round(12*scale)}px;font-weight:700;text-align:left;width:42%;color:${bWin?'#185FA5':(w2?'#8A96AA':'#12213A')};`;
    tr.appendChild(tdA); tr.appendChild(tdS); tr.appendChild(tdB);
    tbody.appendChild(tr);
  }

  if(state.bracket){
    const rounds = state.bracket.rounds;
    const roundNames = rounds.map((_,i)=>{
      const remaining = rounds.length-i;
      if(remaining===1) return '決勝';
      if(remaining===2) return '準決勝';
      if(remaining===3) return '準々決勝';
      return `${i+1}回戦`;
    });
    rounds.forEach((round, ri)=>{
      const real = round.filter(m=> m.a!==null || m.b!==null);
      if(!real.length) return;
      addSectionRow(roundNames[ri]);
      real.forEach(addMatchRow);
    });
    const m3 = state.bracket.thirdPlaceMatch;
    if(m3 && (m3.a || m3.b)){
      addSectionRow('3位決定戦');
      addMatchRow(m3);
    }
  } else {
    state.groups.forEach((_, gi)=>{
      const label = state.groups.length>1 ? `グループ${String.fromCharCode(65+gi)}` : '予選';
      const gMatches = state.matches.filter(m=>m.groupIdx===gi);
      if(!gMatches.length) return;
      addSectionRow(label);
      gMatches.forEach(m=>{
        let w2 = m.forfeitWinner;
        if(!w2){
          const hasScores = m.scoreA!==null && m.scoreA!=='' && m.scoreB!==null && m.scoreB!=='';
          if(hasScores && Number(m.scoreA)!==Number(m.scoreB)) w2 = Number(m.scoreA)>Number(m.scoreB) ? m.a : m.b;
        }
        addMatchRow(Object.assign({}, m, {winner:w2}));
      });
    });
  }

  inner.appendChild(table);
  box.appendChild(inner);
  return box;
}

async function exportSnsImage(contentType, format){
  if(typeof html2canvas==='undefined'){
    showAlertModal('画像生成ライブラリの読み込みに失敗しました。インターネット接続を確認してもう一度お試しください。');
    return;
  }
  const title = state.tournamentName && state.tournamentName.trim() ? state.tournamentName.trim() : '大会結果';
  const w = 1080;
  const h = format==='story' ? 1920 : 1080;

  let dom;
  if(contentType==='results'){
    const standings = getFinalStandings();
    if(!standings){
      showAlertModal('まだ優勝が決まっていないため、結果発表画像は作れません。');
      return;
    }
    dom = buildResultsImageDOM(w, h, standings, title);
  } else {
    if(!state.bracket && !state.matches.length){
      showAlertModal('まだ作成できるデータがありません。');
      return;
    }
    dom = buildBracketImageDOM(w, h, title);
  }

  dom.style.position = 'fixed';
  dom.style.left = '-99999px';
  dom.style.top = '0';
  document.body.appendChild(dom);
  try{
    const canvas = await html2canvas(dom, {width:w, height:h, scale:1, backgroundColor:'#F7F8FA'});
    const dataUrl = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    const kindLabel = contentType==='results' ? '結果発表' : 'トーナメント表';
    const sizeLabel = format==='story' ? 'ストーリー' : '正方形';
    const safeName = title.replace(/[\\/:*?"<>|]/g,'_');
    a.href = dataUrl;
    a.download = `${safeName}_${kindLabel}_${sizeLabel}.png`;
    a.click();
    showToast('📸 画像を保存しました');
  } finally {
    document.body.removeChild(dom);
  }
}

      box.appendChild(renderSlot(m, 'b', ri, mi, scoreBInput));
      if(m.forfeitWinner){
        box.appendChild(el(`<p class="small-note" style="color:var(--lose);font-weight:700;margin-top:8px;margin-bottom:0;">不戦勝・不戦敗</p>`));
      }
      // 1試合だけの不戦敗（片方だけ）を個別に設定できるミニコントロール
      if(!m.forfeitWinner && m.a && m.b && m.a!=='BYE' && m.b!=='BYE' && !matchWinner(m) && !(ri===0 && bracketEditMode)){
        const ff = el(`<div class="row" style="margin-top:6px;gap:6px;"></div>`);
        const btnA = el(`<button class="btn-ghost btn-sm" style="font-size:11px;padding:4px 8px;">${escapeHtml(teamName(m.a))}を不戦敗に</button>`);
        const btnB = el(`<button class="btn-ghost btn-sm" style="font-size:11px;padding:4px 8px;">${escapeHtml(teamName(m.b))}を不戦敗に</button>`);
        btnA.addEventListener('click', ()=>{ m.forfeitWinner=m.b; m.forfeitCausedBy=null; propagateByes(); render(); });
        btnB.addEventListener('click', ()=>{ m.forfeitWinner=m.a; m.forfeitCausedBy=null; propagateByes(); render(); });
        ff.appendChild(btnA); ff.appendChild(btnB);
        box.appendChild(ff);
      } else if(m.forfeitWinner && !m.forfeitCausedBy){
        const undoBtn = el(`<button class="btn-ghost btn-sm" style="font-size:11px;padding:4px 8px;margin-top:6px;">不戦敗を取り消す</button>`);
        undoBtn.addEventListener('click', ()=>{ m.forfeitWinner=null; propagateByes(); render(); });
        box.appendChild(undoBtn);
      }
      col.appendChild(box);
    });
    bracketEl.appendChild(col);
  });
  area.appendChild(bracketEl);

  // 3位決定戦
  if(state.bracket.thirdPlaceMatch){
    const m3 = state.bracket.thirdPlaceMatch;
    const tpWrap = el(`<div style="margin-top:18px;max-width:260px;"><div class="round-title">3位決定戦</div></div>`);
    const box = el(`<div class="bmatch"></div>`);
    const canScore = !m3.forfeitWinner && m3.a && m3.b;
    let scoreAInput=null, scoreBInput=null;
    if(canScore){
      scoreAInput = el(`<input type="number" min="0" max="999" step="1" inputmode="numeric" pattern="[0-9]*" style="width:52px;flex:none;" data-input-key="bracket-tp-a" value="${m3.scoreA===null?'':m3.scoreA}">`);
      scoreBInput = el(`<input type="number" min="0" max="999" step="1" inputmode="numeric" pattern="[0-9]*" style="width:52px;flex:none;" data-input-key="bracket-tp-b" value="${m3.scoreB===null?'':m3.scoreB}">`);
      scoreAInput.addEventListener('input', e=>{ m3.scoreA = clampScoreValue(e.target.value); propagateByes(); scheduleRender(); });
      scoreBInput.addEventListener('input', e=>{ m3.scoreB = clampScoreValue(e.target.value); propagateByes(); scheduleRender(); });
    }
    box.appendChild(renderSlot(m3, 'a', -1, -1, scoreAInput));
    box.appendChild(el(`<div class="bdivider"></div>`));
    box.appendChild(renderSlot(m3, 'b', -1, -1, scoreBInput));
    if(!m3.a || !m3.b){
      box.appendChild(el(`<p class="small-note" style="margin-top:8px;margin-bottom:0;">準決勝の結果待ちです</p>`));
    }
    tpWrap.appendChild(box);
    area.appendChild(tpWrap);
  }

  // champion
  const standings = getFinalStandings();
  const champArea = wrap.querySelector('#championArea');
  if(standings){
    const banner = el(`
      <div class="champion-banner">
        <div class="tag">Champion</div>
        <div class="name">🏆 ${escapeHtml(standings.championName)}</div>
      </div>
    `);
    if(standings.runnerUpName || standings.thirdPlaceNames.length){
      const podium = el(`<div style="margin-top:14px;font-size:13px;color:#C7D5E8;"></div>`);
      if(standings.runnerUpName) podium.appendChild(el(`<p style="margin:2px 0;">🥈 準優勝：${escapeHtml(standings.runnerUpName)}</p>`));
      if(standings.thirdPlaceNames.length===1) podium.appendChild(el(`<p style="margin:2px 0;">🥉 3位：${escapeHtml(standings.thirdPlaceNames[0])}</p>`));
      else if(standings.thirdPlaceNames.length===2) podium.appendChild(el(`<p style="margin:2px 0;">🥉 3位（同着）：${escapeHtml(standings.thirdPlaceNames[0])}・${escapeHtml(standings.thirdPlaceNames[1])}</p>`));
      banner.appendChild(podium);
    }
    if(state.savedThisTournament){
      banner.appendChild(el(`<p style="margin-top:14px;color:#8FE0BC;font-size:13px;font-weight:700;">✓ 大会履歴に保存しました</p>`));
    } else {
      const saveBtn = el(`<button class="btn-amber" style="margin-top:16px;">この結果を大会履歴に保存</button>`);
      saveBtn.addEventListener('click', ()=>{ saveCurrentTournamentToHistory(); });
      banner.appendChild(saveBtn);
    }
    champArea.appendChild(banner);
  }

  wrap.querySelector('#toggleEdit').addEventListener('click', ()=>{ bracketEditMode=!bracketEditMode; render(); });
  wrap.querySelector('#reseedBtn').addEventListener('click', ()=>{
    const hasProgress = state.bracket.rounds.some(round=> round.some(m=> matchWinner(m) && m.a!=='BYE' && m.b!=='BYE'));
    const proceed = ()=>{ generateBracket(); render(); showToast('🔀 シードを組み直しました'); };
    if(hasProgress){
      showConfirmModal('すでに決着したカードがあります。シードを組み直すと、決勝トーナメントの結果はすべて消えます。よろしいですか？', proceed);
    } else {
      proceed();
    }
  });
  wrap.querySelector('#backToAdvance').addEventListener('click', ()=>{ state.stage='advance'; render(); });
  return wrap;
}

function drawBracketConnectors(panelEl){
  if(!state.bracket) return;
  const container = panelEl.querySelector('.bracket');
  if(!container) return;
  const containerRect = container.getBoundingClientRect();
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS,'svg');
  svg.setAttribute('class','bracket-lines');
  svg.setAttribute('width', container.scrollWidth);
  svg.setAttribute('height', container.scrollHeight);

  const rounds = state.bracket.rounds;
  const roundCols = container.querySelectorAll('.round-col');
  for(let ri=0; ri<rounds.length-1; ri++){
    const col = roundCols[ri];
    const nextCol = roundCols[ri+1];
    if(!col || !nextCol) continue;
    const boxes = col.querySelectorAll('.bmatch');
    const nextBoxes = nextCol.querySelectorAll('.bmatch');
    rounds[ri].forEach((m, mi)=>{
      const box = boxes[mi];
      const nextBox = nextBoxes[Math.floor(mi/2)];
      if(!box || !nextBox) return;
      const boxRect = box.getBoundingClientRect();
      const nextRect = nextBox.getBoundingClientRect();
      const startX = boxRect.right - containerRect.left;
      const startY = boxRect.top + boxRect.height/2 - containerRect.top;
      const endX = nextRect.left - containerRect.left;
      const endY = nextRect.top + nextRect.height/2 - containerRect.top;
      const midX = (startX+endX)/2;
      const advanced = !!m.winner; // this match's result has decided who moves on
      const path = document.createElementNS(svgNS,'path');
      path.setAttribute('d', `M ${startX} ${startY} H ${midX} V ${endY} H ${endX}`);
      path.setAttribute('fill','none');
      path.setAttribute('stroke', advanced ? '#2E7D5B' : '#CBD3E1');
      path.setAttribute('stroke-width', advanced ? '3.5' : '1.5');
      path.setAttribute('stroke-linecap','round');
      svg.appendChild(path);
    });
  }
  container.insertBefore(svg, container.firstChild);
}

let bracketEditMode = false;
function renderSlot(m, side, ri, mi, scoreInputEl){
  const val = m[side];
  const w = m.winner;
  let cls='bslot';
  if(w){ cls += (val===w) ? ' winner' : ' loser'; }
  const displayName = val===null ? '（未定）' : (val==='BYE' ? '― 不戦勝 ―' : teamName(val));
  const slot = el(`<div class="${cls}"><span class="bname">${escapeHtml(displayName)}</span></div>`);
  if(ri===0 && bracketEditMode && val!==null){
    const select = document.createElement('select');
    const round0 = state.bracket.rounds[0];
    const allSlots = [];
    round0.forEach((match, idx)=>{
      allSlots.push({matchIdx:idx, side:'a', val: match.a});
      allSlots.push({matchIdx:idx, side:'b', val: match.b});
    });
    allSlots.forEach(s=>{
      const opt = document.createElement('option');
      opt.value = `${s.matchIdx}:${s.side}`;
      opt.textContent = s.val==='BYE' ? '― 不戦勝 ―' : teamName(s.val);
      if(s.matchIdx===mi && s.side===side) opt.selected = true;
      select.appendChild(opt);
    });
    select.addEventListener('change', e=>{
      const [targetIdx, targetSide] = e.target.value.split(':');
      const ti = Number(targetIdx);
      const curVal = round0[mi][side];
      const targetVal = round0[ti][targetSide];
      round0[ti][targetSide] = curVal;
      round0[mi][side] = targetVal;
      propagateByes();
      render();
    });
    slot.appendChild(select);
  }
  if(scoreInputEl) slot.appendChild(scoreInputEl);
  return slot;
}

if ('serviceWorker' in navigator && (location.protocol==='https:' || location.hostname==='localhost')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}

document.addEventListener('focus', function(e){
  if(isRestoringFocus) return;
  if(e.target && e.target.tagName==='INPUT' && e.target.type==='number'){
    e.target.select();
  }
}, true);

document.addEventListener('keydown', function(e){
  if(e.key!=='Enter') return;
  const t = e.target;
  if(!t || t.tagName!=='INPUT' || t.type!=='number' || !t.hasAttribute('data-input-key')) return;
  e.preventDefault();
  const all = Array.from(document.querySelectorAll('input[type="number"][data-input-key]'));
  const idx = all.indexOf(t);
  if(idx>-1 && idx<all.length-1){
    all[idx+1].focus();
  } else {
    t.blur();
  }
});

render();
initHistory();
initAutosaveCheck();
</script>
